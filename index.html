<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Puzzle 3x3 - Atelier Mémoire</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            background: #f9f9f9; 
            padding: 20px;
        }
        
        h1 { color: #333; }
        
        /* Plateau du puzzle avec image fantôme */
        #puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 450px;
            max-width: 90vw;
            aspect-ratio: 1 / 1;
            border: 3px solid #333;
            background-color: #ddd; 
            background-image: url('https://picsum.photos/id/1015/600/600'); 
            background-size: cover;
            position: relative;
            gap: 3px;
            padding: 3px;
            box-sizing: border-box;
            margin: 20px auto;
        }

        /* Filigrane à 10% */
        #puzzle-board::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('https://picsum.photos/id/1015/600/600');
            background-size: cover;
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
        }

        .slot {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0,0,0,0.2);
            box-sizing: border-box;
            background-color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        
        .piece {
            width: 100%;
            height: 100%;
            cursor: grab;
            background-size: 300% 300%;
            background-image: url('https://picsum.photos/id/1015/600/600');
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            user-select: none;
        }
        
        .piece:active {
            cursor: grabbing;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Carte postale rétro</h1>

    <div id="puzzle-board"></div>

    <div style="margin: 20px 0;">
        <button onclick="shufflePieces()" style="padding: 12px 24px; font-size: 16px; cursor: pointer; background: #4a90e2; color: white; border: none; border-radius: 6px;">
            Mélanger les pièces
        </button>
    </div>

    <div id="pieces-container" style="margin-top: 20px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 500px;">
        <!-- Pièces générées par JS -->
    </div>

    <div id="win-message" style="display: none; margin-top: 30px; font-size: 28px; color: #27ae60; font-weight: bold; text-align: center;">
    </div>

    <script>
        let draggedPiece = null;

        function allowDrop(ev) { ev.preventDefault(); }

        function drag(ev) {
            draggedPiece = ev.target;
            ev.dataTransfer.setData("text", ev.target.id);
        }

        document.addEventListener('dragend', () => { draggedPiece = null; });

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const piece = document.getElementById(data);
            let target = ev.target;

            if (!target.classList.contains('slot')) {
                target = target.closest('.slot');
            }

            if (target && target.classList.contains('slot')) {
                if (target.children.length === 0) {
                    target.appendChild(piece);
                } else {
                    const existingPiece = target.children[0];
                    const sourceSlot = draggedPiece ? draggedPiece.parentElement : null;
                    if (sourceSlot && sourceSlot.classList.contains('slot')) {
                        sourceSlot.appendChild(existingPiece);
                    }
                    target.appendChild(piece);
                }
                checkWin();
            }
        }

        function checkWin() {
            const slots = document.querySelectorAll('.slot');
            let isWin = true;
            
            slots.forEach((slot, index) => {
                if (slot.children.length === 0 || slot.children[0].id !== 'piece-' + index) {
                    isWin = false;
                }
            });
            
            if (isWin) {
                document.getElementById('win-message').innerHTML = '🎉 Félicitations !<br>Puzzle terminé avec succès !';
                document.getElementById('win-message').style.display = 'block';
            }
        }

        function initPuzzle() {
            const board = document.getElementById('puzzle-board');
            
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.ondrop = drop;
                slot.ondragover = allowDrop;
                board.appendChild(slot);
            }
            
            createPieces();
        }

        function createPieces(shuffle = true) {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';
            
            let indices = [0,1,2,3,4,5,6,7,8];
            if (shuffle) indices.sort(() => Math.random() - 0.5);

            for (let idx = 0; idx < 9; idx++) {
                const originalIndex = indices[idx];
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.id = 'piece-' + originalIndex;
                piece.draggable = true;
                piece.ondragstart = drag;

                const row = Math.floor(originalIndex / 3);
                const col = originalIndex % 3;
                piece.style.backgroundPosition = `${col * 50}% ${row * 50}%`;
                
                container.appendChild(piece);
            }
        }

        function shufflePieces() {
            createPieces(true);
            document.getElementById('win-message').style.display = 'none';
        }

        window.onload = initPuzzle;
    </script>
</body>
</html>
