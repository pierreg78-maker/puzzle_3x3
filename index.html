<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Puzzle 3x3 - Atelier Mémoire</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif; 
            background: #f9f9f9; 
            padding: 20px;
            margin: 0;
        }
        
        h1 { color: #333; margin-bottom: 10px; }
        
        #puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 450px;
            max-width: 90vw;
            aspect-ratio: 1 / 1;
            border: 4px solid #333;
            background-color: #ddd; 
            background-image: url('https://picsum.photos/id/1015/600/600'); 
            background-size: cover;
            position: relative;
            gap: 4px;
            padding: 4px;
            box-sizing: border-box;
            margin: 20px auto;
            border-radius: 8px;
            overflow: hidden;
        }

        #puzzle-board::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('https://picsum.photos/id/1015/600/600');
            background-size: cover;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }

        .slot {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0,0,0,0.15);
            background-color: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            border-radius: 4px;
        }
        
        .piece {
            width: 100%;
            height: 100%;
            cursor: grab;
            background-size: 300% 300%;
            background-image: url('https://picsum.photos/id/1015/600/600');
            box-shadow: 2px 4px 12px rgba(0,0,0,0.25);
            border: 1px solid #ddd;
            border-radius: 4px;
            user-select: none;
        }
        
        .piece:active { cursor: grabbing; transform: scale(1.08); }

        button {
            padding: 12px 28px;
            font-size: 17px;
            cursor: pointer;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
        }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <h1>Carte postale rétro - Puzzle 3x3</h1>

    <div id="puzzle-board"></div>

    <div style="margin: 25px 0 10px;">
        <button onclick="shufflePieces()">🔀 Mélanger les pièces</button>
    </div>

    <div id="pieces-container" style="margin: 15px 0; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; max-width: 520px;"></div>

    <div id="win-message" style="display: none; margin-top: 30px; font-size: 26px; color: #27ae60; font-weight: bold; text-align: center; padding: 15px; background: #e8f5e8; border-radius: 10px;"></div>

    <script>
        let draggedPiece = null;

        function allowDrop(ev) { ev.preventDefault(); }

        function drag(ev) {
            draggedPiece = ev.target;
            ev.dataTransfer.setData("text/plain", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text/plain");
            const piece = document.getElementById(data);
            if (!piece) return;

            let targetSlot = ev.target;
            while (targetSlot && !targetSlot.classList.contains('slot')) {
                targetSlot = targetSlot.parentElement;
            }

            if (targetSlot && targetSlot.classList.contains('slot')) {
                if (targetSlot.children.length === 0) {
                    targetSlot.appendChild(piece);
                } else {
                    const existing = targetSlot.children[0];
                    const source = draggedPiece.parentElement;
                    if (source && source.classList.contains('slot')) source.appendChild(existing);
                    targetSlot.appendChild(piece);
                }
                checkWin();
            }
        }

        function checkWin() {
            const slots = document.querySelectorAll('.slot');
            let won = true;
            slots.forEach((slot, i) => {
                if (!slot.children[0] || slot.children[0].id !== `piece-${i}`) won = false;
            });

            if (won) {
                document.getElementById('win-message').innerHTML = "🎉 Félicitations !<br>Vous avez terminé le puzzle !";
                document.getElementById('win-message').style.display = 'block';
            }
        }

        function createPieces(shuffle = true) {
            const container = document.getElementById('pieces-container');
            container.innerHTML = '';

            let order = [0,1,2,3,4,5,6,7,8];
            if (shuffle) order.sort(() => Math.random() - 0.5);

            order.forEach(idx => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.id = `piece-${idx}`;
                piece.draggable = true;
                piece.ondragstart = drag;

                const row = Math.floor(idx / 3);
                const col = idx % 3;
                piece.style.backgroundPosition = `${col * 50}% ${row * 50}%`;

                container.appendChild(piece);
            });
        }

        function shufflePieces() {
            createPieces(true);
            document.getElementById('win-message').style.display = 'none';
        }

        function initPuzzle() {
            const board = document.getElementById('puzzle-board');
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.ondragover = allowDrop;
                slot.ondrop = drop;
                board.appendChild(slot);
            }
            createPieces(true);
        }

        window.onload = initPuzzle;
    </script>
</body>
</html>
